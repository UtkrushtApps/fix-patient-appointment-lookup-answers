services:
  db:
    image: postgres:15-alpine
    container_name: patient_appointments_db
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - ./init_database.sql:/docker-entrypoint-initdb.d/init_database.sql:ro

  app:
    build: .
    container_name: patient_appointments_app
    depends_on:
      - db
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: healthcare
      PGUSER: app_user
      PGPASSWORD: app_password
      PORT: 3000
    ports:
      - "3000:3000"

